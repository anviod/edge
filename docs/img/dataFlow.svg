<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg">

<rect width="100%" height="100%" fill="white"></rect>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
    <polygon points="0,0 8,4 0,8" fill="#555"></polygon>
  </marker>

  <!-- 粒子 -->
  <circle id="mqtt" r="3" fill="#ff9800"></circle>
  <circle id="opc" r="3" fill="#03a9f4"></circle>
  <circle id="http" r="3" fill="#673ab7"></circle>
  <circle id="bacnet" r="3" fill="#e91e63"></circle>
  <circle id="snmp" r="3" fill="#8bc34a"></circle>
  <circle id="custom" r="3" fill="#fdd835"></circle>

  <circle id="uplink_dot" r="3" fill="#1976d2"></circle>
  <circle id="ctrl_dot" r="2" fill="#4caf50"></circle>
  <circle id="local_dot" r="2.5" fill="#555"></circle>
</defs>

<!-- ================= Cloud ================= -->
<rect x="600" y="20" width="200" height="60" rx="20" fill="#e3f2fd" stroke="#90caf9"></rect>
<text x="700" y="55" text-anchor="middle">Cloud</text>

<!-- ================= Gateway ================= -->
<rect x="550" y="150" width="300" height="70" rx="10" fill="#e8f5e9" stroke="#66bb6a"></rect>
<text x="700" y="190" text-anchor="middle">IoT Gateway</text>
<text x="540" y="185" font-size="10" fill="#4caf50" text-anchor="end">CTRL IN</text>

<!-- ================= Shadow ================= -->
<rect x="550" y="250" width="300" height="100" rx="10" fill="#f5f5f5" stroke="#999"></rect>
<text x="700" y="285" text-anchor="middle">Shadow Core</text>

<!-- ================= Optimization ================= -->
<rect x="550" y="370" width="300" height="120" rx="10" fill="#fafafa" stroke="#bbb"></rect>
<text x="700" y="405" text-anchor="middle">Smart Optimization</text>

<!-- ================= 主干 ================= -->
<path id="bus" d="M700 220 L700 540" stroke="#bbb" stroke-width="2" fill="none"></path>

<path id="bus_h" d="M150 540 L1120 540" stroke="#ccc" stroke-width="2" fill="none"></path>

<!-- ================= 分支 ================= -->
<path id="p1" d="M210 540 L210 600" stroke="#ddd" stroke-width="2" fill="none"></path>
<path id="p2" d="M380 540 L380 600" stroke="#ddd" stroke-width="2" fill="none"></path>
<path id="p3" d="M550 540 L550 600" stroke="#ddd" stroke-width="2" fill="none"></path>
<path id="p4" d="M720 540 L720 600" stroke="#ddd" stroke-width="2" fill="none"></path>
<path id="p5" d="M890 540 L890 600" stroke="#ddd" stroke-width="2" fill="none"></path>
<path id="p6" d="M1060 540 L1060 600" stroke="#ddd" stroke-width="2" fill="none"></path>

<!-- ================= Connectors ================= -->
<rect x="150" y="600" width="120" height="70" rx="8" fill="#fff3e0" stroke="#ff9800"></rect>
<text x="210" y="640" text-anchor="middle">MQTT</text>

<rect x="320" y="600" width="120" height="70" rx="8" fill="#e1f5fe" stroke="#03a9f4"></rect>
<text x="380" y="640" text-anchor="middle">OPC-UA</text>

<rect x="490" y="600" width="120" height="70" rx="8" fill="#ede7f6" stroke="#673ab7"></rect>
<text x="550" y="640" text-anchor="middle">HTTP</text>

<rect x="660" y="600" width="120" height="70" rx="8" fill="#fce4ec" stroke="#e91e63"></rect>
<text x="720" y="640" text-anchor="middle">BACnet</text>

<rect x="830" y="600" width="120" height="70" rx="8" fill="#f1f8e9" stroke="#8bc34a"></rect>
<text x="890" y="640" text-anchor="middle">SNMP</text>

<rect x="1000" y="600" width="120" height="70" rx="8" fill="#fffde7" stroke="#fdd835"></rect>
<text x="1060" y="640" text-anchor="middle">Custom</text>

<!-- ================= 上行（垂直直线） ================= -->
<path id="uplink" d="M700 150 L700 80" stroke="#1976d2" stroke-width="3" fill="none" marker-end="url(#arrow)"></path>

<!-- ================= 控制回流 ================= -->
<path id="ctrl" d="M800 50 L1300 50 L1300 740 L100 740 L100 185 L550 185" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,6" fill="none" marker-end="url(#arrow)"></path>

<!-- ================= 粒子动画 ================= -->

<!-- 上行 -->
<use href="#uplink_dot">
  <animateMotion dur="2.5s" repeatCount="indefinite">
    <mpath href="#uplink"></mpath>
  </animateMotion>
</use>

<!-- 控制 -->
<use href="#ctrl_dot">
  <animateMotion dur="6s" repeatCount="indefinite">
    <mpath href="#ctrl"></mpath>
  </animateMotion>
</use>

<!-- 主干 -->
<use href="#local_dot">
  <animateMotion dur="4s" repeatCount="indefinite">
    <mpath href="#bus"></mpath>
  </animateMotion>
</use>

<!-- ================= 驱动层粒子（核心补充） ================= -->

<use href="#mqtt">
  <animateMotion dur="2.5s" repeatCount="indefinite">
    <mpath href="#p1"></mpath>
  </animateMotion>
</use>

<use href="#opc">
  <animateMotion dur="2.5s" begin="0.5s" repeatCount="indefinite">
    <mpath href="#p2"></mpath>
  </animateMotion>
</use>

<use href="#http">
  <animateMotion dur="2.5s" begin="1s" repeatCount="indefinite">
    <mpath href="#p3"></mpath>
  </animateMotion>
</use>

<use href="#bacnet">
  <animateMotion dur="2.5s" begin="1.5s" repeatCount="indefinite">
    <mpath href="#p4"></mpath>
  </animateMotion>
</use>

<use href="#snmp">
  <animateMotion dur="2.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#p5"></mpath>
  </animateMotion>
</use>

<use href="#custom">
  <animateMotion dur="2.5s" begin="1.2s" repeatCount="indefinite">
    <mpath href="#p6"></mpath>
  </animateMotion>
</use>

</svg>